<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>FluxJot</title>
<link id="sakura-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakura.css/css/sakura.css" type="text/css">
<style>
#sync-status {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 6px 12px;
  font-size: 0.85em;
  min-height: 1.5em;
}
#sync-status.sync-syncing {
  background-color: #cce5ff;
  color: #004085;
}
#sync-status.sync-ok {
  background-color: #d4edda;
  color: #155724;
}
#sync-status.sync-error {
  background-color: #f8d7da;
  color: #721c24;
  cursor: pointer;
}
#sync-status.sync-unauthenticated {
  background-color: #fff3cd;
  color: #856404;
}
#body, #search, [id^="edit-body-"] {
  width: 100%;
  font-size: 1.8rem;
}
@media (max-width: 684px) {
  #body, #search, [id^="edit-body-"] {
    font-size: 16px; /* iOS Safari のズーム抑制（16px 未満でズームが発生するため） */
  }
}
</style>
</head>
<body>
<div id="sync-status"></div>
<h1>FluxJot</h1>
<label for="theme-select">テーマ: </label>
<select id="theme-select">
  <option value="sakura">Default</option>
  <option value="sakura-dark">Dark</option>
  <option value="sakura-vader">Vader</option>
  <option value="sakura-earthly">Earthly</option>
</select>
<div id="auth-section">
  <p>Google Drive と同期するにはログインしてください。</p>
  <button onclick="startAuth()">Google でログイン</button>
</div>
<div id="app-section" style="display:none">
<button id="fab" onclick="document.getElementById('body').value='';document.getElementById('save-btn').disabled=true;document.getElementById('create-dialog').showModal()"
  style="position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;font-size:1.8em;cursor:pointer;z-index:200">＋</button>
<dialog id="create-dialog" style="width:min(48ch,90vw)">
  <form id="create-form" method="dialog">
    <textarea id="body" maxlength="1024" placeholder="メモを入力... (#タグ)" rows="6" style="width:100%"></textarea>
    <br>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button type="button" onclick="document.getElementById('create-dialog').close()">キャンセル</button>
      <button type="button" id="save-btn" disabled>保存</button>
    </div>
    <p id="error" style="color:red"></p>
  </form>
</dialog>
<input id="search" type="search"
  placeholder="検索 (テキスト / #タグ / since:yyyy-mm-dd / until:yyyy-mm-dd)">
<div id="list"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<script src="wasm_exec.js"></script>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
